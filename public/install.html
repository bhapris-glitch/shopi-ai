  <title>Install Chatbot</title>

<body style="font-family:Arial; text-align:center; padding:40px;">

<h2>🚀 Install Layboka Shopi Agent</h2>

<p>Start your <b>3-Day Free Trial</b>. No coding needed.<b> 24/7 working</b></p>

<button onclick="autoInstall()" style="padding:12px 20px;">
Start Free Trial
</button>

<p id="status" style="margin-top:20px;"></p>

<script>
async function autoInstall(){

  const store = prompt("Enter your Shopify store (example: mystore.myshopify.com)");
  const token = prompt("Enter your Admin API Access Token");

  const res = await fetch("/auto-install", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ store, token })
  });

  const data = await res.json();

  document.getElementById("status").innerText = data.message;

}
</script>
