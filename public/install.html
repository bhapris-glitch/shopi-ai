<!DOCTYPE html>
<html>
<head>
  <title>Install Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
</head>

<body style="font-family:Arial; text-align:center; padding:40px;">

<h2>🚀 Install Layboka Shopi Agent</h2>

<div class="hero-form">

      <input
      type="text"
      id="storeInput"
      placeholder="yourstore.myshopify.com">

      <button onclick="startInstall()">
        🚀 Install Free Trial
      </button>

    </div>

    <div class="hero-buttons">

      <a href="pricing.html" class="header-btn">
        View Pricing
      </a>

<p id="status" style="margin-top:20px;"></p>

<script>
async function autoInstall(){

  const store = prompt("Enter your Shopify store (example: mystore.myshopify.com)");
  const token = prompt("Enter your Admin API Access Token");

  const res = await fetch("/auto-install", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ store, token })
  });

  const data = await res.json();

  document.getElementById("status").innerText = data.message;

}
</script>

<footer style="margin-top:40px;">
  <a href="privacy.html">Privacy</a> |
  <a href="terms.html">Terms</a> |
  <a href="pricing.html">Pricing</a> |
  <a href="contact.html">Contact</a>
</footer>

</body>
</html>
