<!DOCTYPE html>
<html>
<head>
  <title>Upgrade Plan - Layboka</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#0b1a2f,#001f3f);
      color: white;
      overflow-x: hidden;
    }

    .header {
      display:flex;
      justify-content:space-between;
      padding:15px 20px;
      background:rgba(0,0,0,0.6);
    }

    .logo {
      font-size:22px;
      font-weight:bold;
      background: linear-gradient(45deg,#00ffc3,#00aaff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .container {
      text-align:center;
      padding:40px 20px;
    }

    .cards {
      display:flex;
      gap:20px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .card {
      width:300px;
      padding:30px;
      border-radius:20px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.2);
    }

    .price {
      font-size:36px;
      color:#00ffc3;
    }

    button {
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:linear-gradient(135deg,#00ffc3,#00aaff);
      cursor:pointer;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="logo">Layboka</div>
</div>

<div class="container">
  <h1>Upgrade Your Plan 🚀</h1>

  <div class="cards">

    <div class="card">
      <h2>Basic</h2>
      <div class="price" id="basicPrice">₹399</div>
      <button onclick="pay('basic')">Upgrade</button>
    </div>

    <div class="card">
      <h2>Premium</h2>
      <div class="price" id="premiumPrice">₹799</div>
      <button onclick="pay('premium')">Subscribe</button>
    </div>

  </div>
</div>

<script>
const clientId = new URLSearchParams(window.location.search).get("client");

// 🌍 AUTO CURRENCY DETECT
fetch("https://ipapi.co/json/")
.then(res => res.json())
.then(data => {
  if(data.country !== "IN"){
    document.getElementById("basicPrice").innerText = "$9";
    document.getElementById("premiumPrice").innerText = "$20";
    window.currency = "USD";
  } else {
    window.currency = "INR";
  }
});

async function pay(plan){

  if(window.currency === "INR"){
    // RAZORPAY
    const res = await fetch("/create-order",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ plan, clientId })
    });

    const order = await res.json();

    const options = {
      key: "YOUR_RAZORPAY_KEY",
      order_id: order.id,
      amount: order.amount,
      handler: function(){
        window.location.href = "/success.html?client=" + clientId;
      }
    };

    new Razorpay(options).open();

  } else {
    // STRIPE
    const res = await fetch("/create-stripe",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ plan, clientId })
    });

    const data = await res.json();
    window.location.href = data.url;
  }
}
</script>

</body>
</html>
