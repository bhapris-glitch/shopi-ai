<!DOCTYPE html>
<html>
<head>
  <title>Start Trial</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="center-container">
<center>
  <form class="glass form-box" id="form">
    <h2>Start Free Trial</h2>

    <input type="text" id="name" placeholder="Your Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="text" id="store" placeholder="Shopify Store URL" required>
<br>
    <button type="submit">Start Trial</button></br>

    <div class="loader" id="loader"></div>
  </form>
</center>
</div>

<!-- SUCCESS POPUP -->
<div class="popup" id="popup">
  <div class="popup-box glass">
    <h3>🎉 Trial Started</h3>
    <p>Your AI assistant is ready!</p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>
const form = document.getElementById("form");
const loader = document.getElementById("loader");
const popup = document.getElementById("popup");

form.onsubmit = async (e) => {
  e.preventDefault();

  loader.style.display = "block";

  const res = await fetch("/signup", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      name: name.value,
      email: email.value,
      store: store.value
    })
  });

  loader.style.display = "none";

  popup.style.display = "flex";
};

function closePopup(){
  popup.style.display = "none";
  window.location = "dashboard.html";
}
</script>

</body>
</html>
