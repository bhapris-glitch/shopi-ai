<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Start Free Trial</h2>

<input id="name" placeholder="Name"><br>
<input id="email" placeholder="Email"><br>
<input id="store" placeholder="Shopify Store"><br>
<input id="token" placeholder="API Token"><br>

<button onclick="signup()">Start Trial</button>

<div id="result"></div>

<script>
async function signup(){
  const res = await fetch("/signup", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      name:name.value,
      email:email.value,
      store:store.value,
      token:token.value
    })
  });

  const data = await res.json();

  document.getElementById("result").innerHTML = `
  <h3>✅ Trial Started</h3>
  <p>Install this in Shopify:</p>
  <textarea style="width:100%;height:100px;">${data.script}</textarea>
  <p>Trial: 24 hours</p>
  <a href="dashboard.html?client=${data.clientId}">Go Dashboard</a>
  `;
}
</script>

</body>
</html>
