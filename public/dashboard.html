<!DOCTYPE html>
<html>
<head>
  <title>Client Dashboard</title>
</head>
<body style="font-family:Arial; text-align:center; padding:50px;">

<h2>Client Dashboard</h2>

<input id="store" placeholder="Store URL (yourstore.myshopify.com)"><br><br>
<input id="token" placeholder="Admin API Token"><br><br>
<input id="clientId" placeholder="Client ID"><br><br>

<button onclick="install()">🚀 Install Chatbot</button>

<p id="status"></p>

<script>
async function install(){
  const store = document.getElementById("store").value;
  const token = document.getElementById("token").value;
  const clientId = document.getElementById("clientId").value;

  const res = await fetch("/auto-install", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ store, token, clientId })
  });

  const data = await res.json();
  document.getElementById("status").innerText = "✅ Installed!";
}
</script>

</body>
</html>
