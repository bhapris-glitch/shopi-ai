<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

  <h2>Client Dashboard</h2>

  <div class="glass card">
    <h3>Install Chatbot</h3>

    <input id="store" placeholder="yourstore.myshopify.com">
    <input id="token" placeholder="Admin API Token">
    <input id="clientId" placeholder="Client ID">

    <button onclick="install()">🚀 Install</button>

    <p id="status"></p>
  </div>

</div>

<script>
async function install(){
  document.getElementById("status").innerText = "Installing...";

  const res = await fetch("/auto-install", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      store: store.value,
      token: token.value,
      clientId: clientId.value
    })
  });

  document.getElementById("status").innerText = "✅ Installed!";
}
</script>

</body>
</html>
